<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Edit Sample</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ v }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='simple-keyboard.css') }}">
</head>
<body>
    <header>
        <a href="{% if from_eval %}/evaluate/{{ sample.id }}{% else %}/sample/{{ coffee.id }}{% endif %}" class="back-btn">&larr;</a>
        <h1>Edit Sample</h1>
    </header>

    <main>
        <form action="/sample/{{ sample.id }}/edit" method="POST" class="sample-form">
            {% if from_eval %}<input type="hidden" name="from_eval" value="1">{% endif %}
            <!-- Move to different coffee -->
            <div class="field">
                <label for="coffee_id">Coffee</label>
                <select id="coffee_id" name="coffee_id" class="field-select">
                    {% for c in all_coffees %}
                    <option value="{{ c.id }}" {% if c.id == sample.coffee_id %}selected{% endif %}>{{ c.label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="row">
                <div class="field">
                    <label for="grind_size">Grind</label>
                    <input type="number" id="grind_size" name="grind_size" required
                           step="0.01" min="0" value="{{ sample.grind_size }}">
                </div>
                <div class="field">
                    <label for="grams_in">In (g)</label>
                    <input type="number" id="grams_in" name="grams_in" required
                           step="0.01" min="0" value="{{ sample.grams_in }}">
                </div>
                <div class="field">
                    <label for="grams_out">Out (g)</label>
                    <input type="number" id="grams_out" name="grams_out" required
                           step="0.01" min="0" value="{{ sample.grams_out }}">
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label for="brew_sec">Time (sec)</label>
                    <input type="number" id="brew_sec" name="brew_sec"
                           min="0" max="300" value="{{ sample.brew_time_sec }}">
                </div>
                <div class="field">
                    <label for="brew_temp_c">Temp (&deg;C)</label>
                    <input type="number" id="brew_temp_c" name="brew_temp_c"
                           step="0.5" min="70" max="100" value="{{ sample.brew_temp_c or 91 }}">
                </div>
            </div>

            <div class="coffee-detail" style="margin:8px 0">
                <span>Created {{ sample.created_at[:10] }}</span>
                {% if sample.days_since_roast is not none %}<span>Day {{ sample.days_since_roast }}</span>{% endif %}
                <span>Ratio 1:{{ "%.1f"|format(sample.ratio) if sample.ratio else "?" }}</span>
            </div>

            <button type="submit" class="btn-add">Save Changes</button>
        </form>
    </main>

    <div id="keyboard" class="kbd hidden">
        <div class="simple-keyboard"></div>
    </div>
    <script src="{{ url_for('static', filename='simple-keyboard.min.js') }}"></script>
    <script src="{{ url_for('static', filename='keyboard.js') }}?v={{ v }}"></script>
</body>
</html>
