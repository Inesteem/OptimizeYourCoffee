<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tasting Note Labels</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ v }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='simple-keyboard.css') }}">
</head>
<body>
    <header>
        <a href="/" class="back-btn">&larr;</a>
        <h1>Tasting Note Labels</h1>
    </header>

    <main>
        {% if request.args.get('error') == 'duplicate' %}
        <div class="diagnostic" style="border-left-color:#e06060;background:#4a2020;margin-bottom:12px">
            <p>That label already exists.</p>
        </div>
        {% endif %}

        <form action="/settings/tasting-notes/add" method="POST" class="sample-form">
            <div class="row">
                <div class="field" style="flex:1">
                    <label for="emoji">Emoji</label>
                    <input type="text" id="emoji" name="emoji" placeholder="Tap..." autocomplete="off" style="text-align:center" readonly>
                </div>
                <div class="field" style="flex:3">
                    <label for="name">Note name</label>
                    <input type="text" id="name" name="name" required placeholder="e.g. wild strawberry" autocomplete="off">
                </div>
            </div>
            <button type="submit" class="btn-add">Add Label</button>
            <div id="emoji-picker" class="emoji-grid"></div>
        </form>

        {% if notes %}
        <section class="history" style="margin-top:12px">
            <h2>Custom Labels</h2>
            {% for n in notes %}
            <div class="note-card">
                <form action="/settings/tasting-notes/{{ n.id }}/edit" method="POST" class="note-edit-form">
                    <div class="note-edit-row">
                        <input type="text" name="emoji" value="{{ n.emoji or '' }}" class="note-edit-emoji" placeholder="emoji">
                        <input type="text" name="name" value="{{ n.name }}" class="note-edit-name" required>
                        <button type="submit" class="note-save-btn">Save</button>
                    </div>
                </form>
                <form action="/settings/tasting-notes/{{ n.id }}/delete" method="POST">
                    <button type="submit" class="btn-del-note">Delete</button>
                </form>
            </div>
            {% endfor %}
        </section>
        {% endif %}

        <section class="history" style="margin-top:16px">
            <h2>Built-in Labels</h2>
            <p class="freshness-detail" style="margin-bottom:8px">These are always available. Custom labels above are merged in.</p>
            <div class="notes-list" id="builtin-notes"></div>
        </section>
    </main>

    <div id="keyboard" class="kbd hidden">
        <div class="simple-keyboard"></div>
    </div>
    <script src="{{ url_for('static', filename='simple-keyboard.min.js') }}"></script>
    <script src="{{ url_for('static', filename='keyboard.js') }}?v={{ v }}"></script>
    <script>
    // Built-in notes reference
    const BUILTIN = {
        "dried apricot":"🍑","apricot":"🍑","lemonade":"🍋","lemon":"🍋",
        "orange":"🍊","tangerine":"🍊","black currant":"🫐","blueberry":"🫐",
        "strawberry":"🍓","wild strawberry":"🍓","raspberry":"🍓",
        "raspberry jam":"🍓","cherry":"🍒","apple":"🍏","peach":"🍑",
        "plum":"🍇","grape":"🍇","tropical":"🍍","pineapple":"🍍",
        "mango":"🥭","passionfruit":"🍈","melon":"🍈","banana":"🍌",
        "grapefruit":"🍊","lime":"🍋","citrus":"🍋","bergamot":"🍋",
        "cacao nibs":"🍫","chocolate":"🍫","dark chocolate":"🍫",
        "cocoa":"🍫","hazelnut":"🌰","almond":"🌰","walnut":"🌰",
        "nutty":"🌰","honey":"🍯","caramel":"🍮","toffee":"🍮",
        "brown sugar":"🍮","vanilla":"🍦","jasmine":"🌸","rose":"🌹",
        "floral":"🌺","hibiscus":"🌺","tea":"🍵","black tea":"🍵",
        "herbal":"🌿","mint":"🌿","cinnamon":"✨","cardamom":"✨",
        "ginger":"✨","pepper":"🌶️","smoky":"🔥","tobacco":"🍂",
        "wine":"🍷","red wine":"🍷","butter":"🧈","cream":"🥛",
        "cedar":"🪵","woody":"🪵","earthy":"🌍","berry":"🫐",
        "stone fruit":"🍑","nougat":"🍮"
    };
    const wrap = document.getElementById('builtin-notes');
    Object.entries(BUILTIN).sort((a,b) => a[0].localeCompare(b[0])).forEach(([name, emoji]) => {
        const el = document.createElement('div');
        el.className = 'note-item builtin';
        el.innerHTML = `<span class="note-emoji">${emoji}</span><span class="note-name">${name}</span>`;
        wrap.appendChild(el);
    });

    // Emoji search/picker
    const EMOJIS = [
        ["🍎","red apple"],["🍏","green apple"],["🍐","pear"],["🍊","orange,tangerine"],
        ["🍋","lemon,lemonade,citrus"],["🍌","banana"],["🍉","watermelon"],["🍇","grape,plum"],
        ["🍓","strawberry,raspberry,berry,jam"],["🫐","blueberry,currant,blackberry"],
        ["🍈","melon,passionfruit,honeydew"],["🍒","cherry"],["🍑","peach,apricot,stone fruit"],
        ["🥭","mango"],["🍍","pineapple,tropical"],["🥥","coconut"],["🥝","kiwi"],
        ["🍅","tomato"],["🫒","olive"],
        ["🍫","chocolate,cacao,cocoa,dark chocolate,milk chocolate"],
        ["🍮","caramel,toffee,flan,butterscotch,brown sugar,nougat,dulce"],
        ["🍯","honey"],["🍬","candy,sweet,sugarcane"],["🍭","lollipop"],
        ["🍦","vanilla,ice cream"],["🧈","butter"],["🥛","milk,cream,yogurt"],
        ["🌰","hazelnut,chestnut,almond,walnut,nut,nutty"],["🥜","peanut"],
        ["🌸","jasmine,blossom,sakura"],["🌹","rose"],["🌺","hibiscus,floral,flower"],
        ["🌻","sunflower"],["🌼","chamomile,daisy"],["💜","lavender,violet"],
        ["🌿","herbal,mint,basil,herb,green"],["🍂","tobacco,autumn,leaf"],
        ["🍁","maple,autumn"],["🪵","cedar,wood,woody,oak"],
        ["🍵","tea,black tea,green tea,earl grey"],["☕","coffee,espresso"],
        ["🍷","wine,red wine,port"],["🥃","whiskey,rum,bourbon,spirit"],
        ["🔥","smoky,smoke,fire,roast"],["✨","spice,cinnamon,clove,cardamom,nutmeg,star anise"],
        ["🌶️","pepper,spicy,chili"],["🌍","earthy,earth,soil"],
        ["🧂","salt,salty,mineral"],["🥧","pie,pastry,baked"],
        ["🍞","bread,toast,biscuit,grain,cereal"],
        ["🥐","croissant,pastry,buttery"],["🎯","target,bullseye,precise"],
        ["⭐","star,bright"],["💧","water,clean,crisp"],["🧊","ice,cool,refreshing"],
        ["☁️","cloud,soft,mild"],["🌊","wave,ocean,fresh"],
        ["💐","bouquet,floral,flowers"],["🫧","bubbly,sparkling,effervescent"],
        ["🥄","syrup,thick,viscous"],["🏔️","alpine,mountain,highland"]
    ];

    const emojiInput = document.getElementById('emoji');
    const picker = document.getElementById('emoji-picker');

    function renderPicker(query) {
        query = (query || '').toLowerCase().trim();
        let matches;
        if (!query) {
            matches = EMOJIS;
        } else {
            matches = EMOJIS.filter(([em, tags]) => tags.toLowerCase().includes(query));
        }

        picker.innerHTML = matches.map(([em, tags]) => {
            const label = tags.split(',')[0];
            return `<div class="emoji-grid-item" data-em="${em}"><span class="emoji-grid-em">${em}</span><span class="emoji-grid-label">${label}</span></div>`;
        }).join('');

        picker.querySelectorAll('.emoji-grid-item').forEach(el => {
            el.addEventListener('pointerdown', e => {
                e.preventDefault();
                e.stopPropagation();
                emojiInput.value = el.dataset.em;
                if (window.coffeeKbd) window.coffeeKbd.setInput(el.dataset.em);
                picker.innerHTML = '';
            });
        });
    }

    if (emojiInput) {
        emojiInput.addEventListener('pointerdown', e => {
            e.preventDefault();
            if (picker.children.length > 0) {
                picker.innerHTML = '';
            } else {
                renderPicker('');
            }
        });

        // Search filtering via keyboard
        function waitKbd() {
            if (window.coffeeKbd && window.coffeeKbd.onChange) {
                window.coffeeKbd.onChange((input, value) => {
                    if (input === emojiInput) renderPicker(value);
                });
            } else {
                setTimeout(waitKbd, 50);
            }
        }
        waitKbd();
    }

    document.addEventListener('pointerdown', e => {
        if (picker.children.length > 0 && !picker.contains(e.target) && e.target !== emojiInput) {
            picker.innerHTML = '';
        }
    });
    </script>
</body>
</html>
