<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Edit {{ coffee.label }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ v }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='simple-keyboard.css') }}">
</head>
<body>
    <header>
        <a href="/" class="back-btn">&larr;</a>
        <h1>Edit Coffee</h1>
    </header>

    <main>
        <form action="/coffee/{{ coffee.id }}/edit" method="POST" class="sample-form">
            <div class="field">
                <label for="roaster">Roaster</label>
                <input type="text" id="roaster" name="roaster" value="{{ coffee.roaster or '' }}" placeholder="Company name" autocomplete="off">
            </div>

            <div class="row">
                <div class="field">
                    <label for="origin_country">Country</label>
                    <input type="text" id="origin_country" name="origin_country" value="{{ coffee.origin_country or '' }}" placeholder="e.g. Ethiopia" autocomplete="off">
                </div>
                <div class="field">
                    <label for="origin_city">City/Region</label>
                    <input type="text" id="origin_city" name="origin_city" value="{{ coffee.origin_city or '' }}" placeholder="e.g. Yirgacheffe" autocomplete="off">
                </div>
            </div>

            <div class="field">
                <label for="origin_producer">Producer</label>
                <input type="text" id="origin_producer" name="origin_producer" value="{{ coffee.origin_producer or '' }}" placeholder="Farm or cooperative" autocomplete="off">
            </div>

            <div class="row">
                <div class="field">
                    <label for="variety">Variety</label>
                    <input type="text" id="variety" name="variety" value="{{ coffee.variety or '' }}" placeholder="e.g. Heirloom, SL28" autocomplete="off">
                </div>
                <div class="field">
                    <label for="process">Process</label>
                    <input type="text" id="process" name="process" value="{{ coffee.process or '' }}" placeholder="Washed, Natural, Honey" autocomplete="off">
                </div>
            </div>

            <div class="field">
                <label>Tasting Notes (seller)</label>
                <div class="chip-input">
                    <input type="hidden" name="tasting_notes" value="{{ coffee.tasting_notes or '' }}">
                    <div class="chips">
                        <input type="text" class="chip-text-input" placeholder="Type or tap to add..." autocomplete="off">
                    </div>
                    <div class="chip-suggestions hidden"></div>
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label for="label">Label</label>
                    <input type="text" id="label" name="label" value="{{ coffee.label }}" placeholder="Auto: roaster - variety - process" autocomplete="off">
                </div>
                <div class="field">
                    <label for="roast_date">Roast Date</label>
                    <input type="date" id="roast_date" name="roast_date" value="{{ coffee.roast_date or '' }}">
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label for="bag_weight_g">Bag (g)</label>
                    <input type="number" id="bag_weight_g" name="bag_weight_g" step="1" min="0" value="{{ coffee.bag_weight_g or '' }}" placeholder="e.g. 250">
                </div>
                <div class="field">
                    <label for="bag_price">Price (&euro;)</label>
                    <input type="number" id="bag_price" name="bag_price" step="0.01" min="0" value="{{ coffee.bag_price or '' }}" placeholder="e.g. 14.90">
                </div>
            </div>

            <h3 class="form-section-title">Roaster's Recipe</h3>
            <div class="row">
                <div class="field">
                    <label for="default_grams_in">Dose In (g)</label>
                    <input type="number" id="default_grams_in" name="default_grams_in" step="0.1" min="0" value="{{ coffee.default_grams_in or '' }}" placeholder="e.g. 18">
                </div>
                <div class="field">
                    <label for="default_grams_out">Yield Out (g)</label>
                    <input type="number" id="default_grams_out" name="default_grams_out" step="0.1" min="0" value="{{ coffee.default_grams_out or '' }}" placeholder="e.g. 36">
                </div>
            </div>
            <div class="row">
                <div class="field">
                    <label for="default_brew_min">Brew (min)</label>
                    <input type="number" id="default_brew_min" name="default_brew_min" min="0" max="59" value="{{ (coffee.default_brew_time_sec // 60) if coffee.default_brew_time_sec else '' }}">
                </div>
                <div class="field">
                    <label for="default_brew_sec">Brew (sec)</label>
                    <input type="number" id="default_brew_sec" name="default_brew_sec" min="0" max="59" value="{{ (coffee.default_brew_time_sec % 60) if coffee.default_brew_time_sec else '' }}">
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label for="best_after_days">Best After (days)</label>
                    <input type="number" id="best_after_days" name="best_after_days" value="{{ coffee.best_after_days or 7 }}" min="0" max="60">
                </div>
                <div class="field">
                    <label for="consume_within_days">Use Within (days)</label>
                    <input type="number" id="consume_within_days" name="consume_within_days" value="{{ coffee.consume_within_days or 50 }}" min="1" max="365">
                </div>
            </div>

            <button type="submit" class="btn-add">Save Changes</button>
        </form>

        <div class="edit-actions-row">
            <form action="/coffee/{{ coffee.id }}/archive" method="POST" class="inline">
                <button type="submit" class="btn-archive">
                    {% if coffee.archived %}Unarchive{% else %}Archive (empty bag){% endif %}
                </button>
            </form>
            <form action="/coffee/{{ coffee.id }}/delete" method="POST" class="inline">
                <button type="submit" class="btn-delete-coffee" onclick="return confirm('Delete this coffee and all its samples?')">Delete</button>
            </form>
        </div>
    </main>

    <div id="keyboard" class="kbd hidden">
        <div class="simple-keyboard"></div>
    </div>
    <script src="{{ url_for('static', filename='simple-keyboard.min.js') }}"></script>
    <script src="{{ url_for('static', filename='keyboard.js') }}?v={{ v }}"></script>
    <script src="{{ url_for('static', filename='autocomplete.js') }}?v={{ v }}"></script>
    <script src="{{ url_for('static', filename='tastingnotes.js') }}?v={{ v }}"></script>
</body>
</html>
