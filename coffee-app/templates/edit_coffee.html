<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{% if is_new %}New Coffee{% else %}Edit {{ coffee.label }}{% endif %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ v }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='simple-keyboard.css') }}">
</head>
<body>
    <header>
        <a href="/" class="back-btn">&#9664;</a>
        <h1>{% if is_new %}New Coffee{% else %}Edit Coffee{% endif %}</h1>
        <span class="header-spacer" aria-hidden="true">&#9664;</span>
    </header>

    <main>
        <form action="{% if is_new %}/coffee/add{% else %}/coffee/{{ coffee.id }}/edit{% endif %}" method="POST" class="sample-form">
            <div class="origin-group">
                <div class="origin-map-preview" id="originMapPreview"></div>
                <div class="origin-fields">
                    <div class="field">
                        <label for="label">Label</label>
                        <input type="text" id="label" name="label" value="{{ coffee.label or '' }}" placeholder="Auto: roaster - variety - process" autocomplete="off">
                    </div>
                    <div class="row">
                        <div class="field">
                            <label for="origin_producer">Producer</label>
                            <input type="text" id="origin_producer" name="origin_producer" value="{{ coffee.origin_producer or '' }}" placeholder="Farm or cooperative" autocomplete="off">
                        </div>
                        <div class="field">
                            <label for="roaster">Roaster</label>
                            <input type="text" id="roaster" name="roaster" value="{{ coffee.roaster or '' }}" placeholder="Company name" autocomplete="off">
                        </div>
                    </div>
                    <div class="row">
                        <div class="field">
                            <label for="origin_country">Country</label>
                            <input type="text" id="origin_country" name="origin_country" value="{{ coffee.origin_country or '' }}" placeholder="e.g. Ethiopia" autocomplete="off">
                        </div>
                        <div class="field">
                            <label for="origin_city">City/Region</label>
                            <input type="text" id="origin_city" name="origin_city" value="{{ coffee.origin_city or '' }}" placeholder="e.g. Yirgacheffe" autocomplete="off">
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label for="variety">Variety</label>
                    <input type="text" id="variety" name="variety" value="{{ coffee.variety or '' }}" placeholder="e.g. Heirloom, SL28" autocomplete="off">
                </div>
                <div class="field">
                    <label for="process">Process</label>
                    <select id="process" name="process" class="field-select">
                        <option value="">— Select —</option>
                        {% for p in process_options %}
                        <option {% if coffee.process == p %}selected{% endif %}>{{ p }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="field">
                <label>Tasting Notes (seller)</label>
                <div class="chip-input">
                    <input type="hidden" name="tasting_notes" value="{{ coffee.tasting_notes or '' }}">
                    <div class="chips">
                        <input type="text" class="chip-text-input" placeholder="Type or tap to add..." autocomplete="off">
                    </div>
                    <div class="chip-suggestions hidden"></div>
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label for="bean_color">Bean Color</label>
                    <select id="bean_color" name="bean_color" class="field-select">
                        <option value="">— Select —</option>
                        {% for bc in ["Light","Medium-Light","Medium","Medium-Dark","Dark"] %}
                        <option {% if coffee.bean_color == bc %}selected{% endif %}>{{ bc }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="field">
                    <label for="bean_size">Bean Size</label>
                    <select id="bean_size" name="bean_size" class="field-select">
                        <option value="">— Select —</option>
                        {% for bs in ["Small","Medium","Large","Peaberry"] %}
                        <option {% if coffee.bean_size == bs %}selected{% endif %}>{{ bs }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label for="altitude_min">Altitude Min (masl)</label>
                    <input type="number" id="altitude_min" name="altitude_min" value="{{ coffee.altitude_min or '' }}" min="0" max="5000" placeholder="e.g. 1800">
                </div>
                <div class="field">
                    <label for="altitude_max">Altitude Max (masl)</label>
                    <input type="number" id="altitude_max" name="altitude_max" value="{{ coffee.altitude_max or '' }}" min="0" max="5000" placeholder="e.g. 2100">
                </div>
            </div>


            <div class="row">
                <div class="field">
                    <label for="roast_date">Roast Date</label>
                    <input type="date" id="roast_date" name="roast_date" value="{{ coffee.roast_date or '' }}">
                </div>
                <div class="field">
                    <label for="opened_date">Opened Date</label>
                    <input type="date" id="opened_date" name="opened_date" value="{{ coffee.opened_date or '' }}">
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label for="bag_weight_g">Bag (g)</label>
                    <input type="number" id="bag_weight_g" name="bag_weight_g" step="1" min="0" value="{{ coffee.bag_weight_g or '' }}" placeholder="e.g. 250">
                </div>
                <div class="field">
                    <label for="bag_price">Price (&euro;)</label>
                    <input type="number" id="bag_price" name="bag_price" step="0.01" min="0" value="{{ coffee.bag_price or '' }}" placeholder="e.g. 14.90">
                </div>
            </div>

            <h3 class="form-section-title">Roaster's Recipe</h3>
            <div class="row">
                <div class="field">
                    <label for="default_grams_in">Dose In (g)</label>
                    <input type="number" id="default_grams_in" name="default_grams_in" step="0.01" min="0" value="{{ coffee.default_grams_in or '' }}" placeholder="e.g. 18">
                </div>
                <div class="field">
                    <label for="default_grams_out">Yield Out (g)</label>
                    <input type="number" id="default_grams_out" name="default_grams_out" step="0.01" min="0" value="{{ coffee.default_grams_out or '' }}" placeholder="e.g. 36">
                </div>
            </div>
            <div class="field">
                <label for="default_brew_sec">Brew Time (seconds)</label>
                <input type="number" id="default_brew_sec" name="default_brew_sec" min="0" max="300" value="{{ coffee.default_brew_time_sec or '' }}">
                <input type="hidden" name="default_brew_min" value="0">
            </div>

            <div class="row">
                <div class="field">
                    <label for="best_after_days">Best After (days)</label>
                    <input type="number" id="best_after_days" name="best_after_days" value="{{ coffee.best_after_days or '' }}" min="0" max="60" placeholder="Auto by roast">
                </div>
                <div class="field">
                    <label for="consume_within_days">Use Within (days)</label>
                    <input type="number" id="consume_within_days" name="consume_within_days" value="{{ coffee.consume_within_days or '' }}" min="1" max="365" placeholder="Auto by roast">
                </div>
            </div>

            <button type="submit" class="btn-add">{% if is_new %}Add Coffee{% else %}Save Changes{% endif %}</button>
        </form>

        {% if not is_new %}
        <div class="edit-actions-row">
            <form action="/coffee/{{ coffee.id }}/archive" method="POST" class="inline">
                <button type="submit" class="btn-archive">
                    {% if coffee.archived %}Unarchive{% else %}Archive (empty bag){% endif %}
                </button>
            </form>
            <form action="/coffee/{{ coffee.id }}/delete" method="POST" class="inline">
                <button type="submit" class="btn-delete-coffee" onclick="return confirm('Delete this coffee and all its samples?')">Delete</button>
            </form>
        </div>
        {% endif %}
    </main>

    <div id="keyboard" class="kbd hidden">
        <div class="simple-keyboard"></div>
    </div>
    <script src="{{ url_for('static', filename='simple-keyboard.min.js') }}"></script>
    <script src="{{ url_for('static', filename='keyboard.js') }}?v={{ v }}"></script>
    <script src="{{ url_for('static', filename='autocomplete.js') }}?v={{ v }}"></script>
    <script src="{{ url_for('static', filename='tastingnotes.js') }}?v={{ v }}"></script>
    <script src="{{ url_for('static', filename='coffeeinfo.js') }}?v={{ v }}"></script>
    <script>
    (function() {
        var url = sessionStorage.getItem('coffeeReturnUrl');
        if (url) {
            var btn = document.querySelector('.back-btn[href="/"]');
            if (btn) btn.href = url;
        }
    })();
    (function() {
        var windows = {
            "Light": [12, 60], "Medium-Light": [10, 55], "Medium": [7, 50],
            "Medium-Dark": [5, 42], "Dark": [4, 35]
        };
        var defaultW = [5, 42];
        var sel = document.getElementById('bean_color');
        var ba = document.getElementById('best_after_days');
        var cw = document.getElementById('consume_within_days');
        if (!sel || !ba || !cw) return;
        function update() {
            var w = windows[sel.value] || defaultW;
            ba.placeholder = sel.value ? 'Auto: ' + w[0] + ' days' : 'Auto by roast';
            cw.placeholder = sel.value ? 'Auto: ' + w[1] + ' days' : 'Auto by roast';
        }
        sel.addEventListener('change', update);
        update();
    })();
    </script>
</body>
</html>
